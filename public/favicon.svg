    <rect x="4" y="15" width="6" height="1.5" rx="0.75" fill="#cbd5e1"/>
    <circle cx="18" cy="18" r="5" fill="#10b981" stroke="white" stroke-width="1.5"/>
    <path d="M16.5 18L17.5 19L19.5 17" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
